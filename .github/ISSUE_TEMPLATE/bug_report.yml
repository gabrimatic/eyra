name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing what broke.
      placeholder: "Voice input does not produce a spoken response after transcription."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Shortest path to reproduce the issue.
      placeholder: |
        1. Run python src/main.py
        2. Speak a prompt
        3. Observe no audio response

    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What correct behavior looks like.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened, including any error text.
    validations:
      required: true

  - type: input
    id: eyra_version
    attributes:
      label: Eyra version and install method
      placeholder: "4.1.0, git clone from tag v4.1.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS version and Apple Silicon model
      placeholder: "macOS 15.3, MacBook Pro M4"
    validations:
      required: true

  - type: input
    id: models
    attributes:
      label: MODEL and VISION_MODEL
      placeholder: "MODEL=gemma4:e4b, VISION_MODEL=(empty)"
    validations:
      required: true

  - type: dropdown
    id: input_method
    attributes:
      label: Input method
      options:
        - Voice
        - Typed
        - Both
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: AI backend
      options:
        - Ollama (local)
        - LM Studio (local)
        - OpenRouter
        - Groq
        - OpenAI
        - Custom OpenAI-compatible
        - Mock client
    validations:
      required: true

  - type: checkboxes
    id: enabled_surfaces
    attributes:
      label: Enabled optional surfaces
      options:
        - label: Web UI
        - label: Network/browser tools
        - label: OS/UI tools
        - label: MCP tools
        - label: Agent/coding tools
        - label: Realtime voice
    validations:
      required: false

  - type: textarea
    id: status_output
    attributes:
      label: /status output
      description: Paste `/status` output. Redact personal paths or secrets if needed.
      render: shell
    validations:
      required: false

  - type: textarea
    id: capabilities_route
    attributes:
      label: /capabilities and /route last
      description: Paste `/capabilities` and `/route last` output when the issue involves routing, tools, privacy, Web UI, Realtime, MCP, or external agents. Redact paths, URLs with tokens, and secrets.
      render: shell
    validations:
      required: false

  - type: textarea
    id: certification
    attributes:
      label: Certification output
      description: Paste relevant `uv run python scripts/certify_voice_to_computer.py` output if you ran it.
      render: shell
    validations:
      required: false

  - type: textarea
    id: web_agent_context
    attributes:
      label: Web, Realtime, MCP, or external-agent context
      description: Include Web URL mode (localhost/phone), redacted `/api/health` or `/api/capabilities`, task/job id, approval id/type, enabled tools, external agents configured, and job logs/artifacts with secrets redacted.
      render: shell
    validations:
      required: false

  - type: textarea
    id: voice_diagnose
    attributes:
      label: /voice-diagnose output for voice issues
      description: Required for voice-related issues. Redact personal device names if needed.
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Terminal output
      description: Paste relevant terminal output. Redact secrets, API keys, personal paths, and tokenized Web UI URLs.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any detail that would help reproduce or narrow the issue.
    validations:
      required: false
