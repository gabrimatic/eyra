name: Feature request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One line describing the capability you want.
      placeholder: "Support for additional local model backends beyond Ollama."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What limitation does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be specific about behavior or API.
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety and privacy model
      description: What should stay local, what may leave the machine, what needs approval, and how should cancellation or undo work?
    validations:
      required: false

  - type: textarea
    id: certification
    attributes:
      label: Acceptance and certification
      description: What tests, docs, route policy, or certification rows would prove the feature works?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, examples, prior art, or other useful context.
    validations:
      required: false
