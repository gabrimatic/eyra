name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run --frozen ruff check src tests

  verify:
    name: Verify
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Check lockfile
        run: uv lock --check

      - name: Lint
        run: uv run --frozen ruff check src tests

      - name: Install browser test runtime
        run: uv run --frozen playwright install chromium

      - name: Test
        run: uv run --frozen python -m pytest -q

      - name: Build wheel
        run: uv build --wheel

  setup-check:
    name: setup.sh syntax check
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Check setup.sh syntax
        run: bash -n setup.sh

  docs:
    name: Mintlify docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Mintlify CLI
        run: npm i -g mint@latest

      - name: Validate docs
        env:
          MINTLIFY_TELEMETRY_DISABLED: "1"
        run: mint validate --disable-openapi

      - name: Check docs links
        env:
          MINTLIFY_TELEMETRY_DISABLED: "1"
        run: mint broken-links --check-anchors

      - name: Check docs accessibility
        env:
          MINTLIFY_TELEMETRY_DISABLED: "1"
        run: mint a11y
