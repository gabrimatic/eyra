name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/

  setup-check:
    name: setup.sh syntax check
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Check setup.sh syntax
        run: bash -n setup.sh
