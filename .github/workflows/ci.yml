name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "doc/**"
      - "internal-docs/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
      - "tests/test_docs_site.py"
  pull_request:
    branches: [main]
    paths-ignore:
      - "doc/**"
      - "internal-docs/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
      - "tests/test_docs_site.py"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Ubuntu runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libportaudio2

      - name: Install dependencies
        run: uv sync --locked

      - name: Check lockfile
        run: uv lock --check

      - name: Lint
        run: uv run --frozen ruff check src tests

      - name: Install browser test runtime
        run: uv run --frozen python -m playwright install --with-deps chromium

      - name: Test
        run: uv run --frozen python -m pytest -q

      - name: Build wheel
        run: uv build --wheel

      - name: Check shell scripts
        run: bash -n setup.sh install.sh
