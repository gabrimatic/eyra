name: Docs Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "scripts/build_github_pages_docs.py"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Mintlify CLI
        run: npm i -g mint@latest

      - name: Export Mintlify docs
        env:
          MINTLIFY_TELEMETRY_DISABLED: "1"
        run: python scripts/build_github_pages_docs.py --docs-dir docs --out-dir site --base-path eyra

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy docs site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
