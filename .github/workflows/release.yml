name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v4.3.5"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  github-release:
    name: GitHub release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false

      - name: Check tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib

          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          with open("pyproject.toml", "rb") as fh:
              version = tomllib.load(fh)["project"]["version"]
          if tag != version:
              raise SystemExit(f"Tag v{tag} does not match pyproject version {version}")
          PY
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Build distributions
        run: uv build --sdist --wheel

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Write checksums
        run: |
          cd dist
          shasum -a 256 eyra-* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/eyra-* dist/checksums.txt --clobber
          else
            gh release create "$RELEASE_TAG" dist/eyra-* dist/checksums.txt \
              --title "$RELEASE_TAG" \
              --notes "See CHANGELOG.md for release notes."
          fi
