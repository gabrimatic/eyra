[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "eyra"
version = "1.0.0"
description = "Real-time AI screen analysis from the terminal."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Soroush Yousefpour" }
]
keywords = ["ai", "screen", "vision", "macos", "local", "privacy", "ollama", "qwen"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "aiohttp>=3.13.0",
    "mss>=10.1.0",
    "numpy>=2.2.0",
    "openai-clip>=1.0.1",
    "opencv-python>=4.11.0",
    "pillow>=11.0.0",
    "python-dotenv>=1.1.0",
    "sentence-transformers>=3.4.0",
    "spacy>=3.8.4",
    "torch>=2.6.0",
    "torchaudio>=2.6.0",
    "torchvision>=0.21.0",
]

[project.urls]
Homepage = "https://github.com/gabrimatic/eyra"
Repository = "https://github.com/gabrimatic/eyra"
"Bug Tracker" = "https://github.com/gabrimatic/eyra/issues"
Changelog = "https://github.com/gabrimatic/eyra/blob/master/CHANGELOG.md"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.hatch.metadata]
allow-direct-references = true
