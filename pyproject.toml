[project]
name = "eyra"
version = "1.0.0"
description = "Real-time AI screen analysis from the terminal."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Soroush Yousefpour", email = "gabrimatic@gmail.com" }]
dependencies = [
    "aiohttp>=3.11.11",
    "google-generativeai>=0.8.3",
    "mss>=10.0.0",
    "numpy>=1.22,<2.5",
    "openai-clip>=1.0.1",
    "opencv-python>=4.10.0.84",
    "pillow>=11.0.0",
    "python-dotenv>=1.0.1",
    "sentence-transformers>=3.3.1",
    "spacy>=3.8.3",
    "torch>=2.5.1",
    "torchaudio>=2.5.1",
    "torchvision>=0.20.1",
]
